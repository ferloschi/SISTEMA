name: Deploy Backend to Oracle Cloud

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 137.131.184.106
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            cd ~/sistema
            git pull origin main
            cd backend
            source venv/bin/activate
            pip install -r requirements_clean.txt --quiet
            sudo systemctl restart sistema
            echo "Deploy concluído em $(date)"
